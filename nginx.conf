server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    # Health check endpoint for Coolify
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # Hub landing page at /
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Snake game (static, built into this image)
    location ^~ /snake/ {
        try_files $uri $uri/ /snake/index.html;
    }

    # 2048 game (static, built into this image)
    location ^~ /2048/ {
        try_files $uri $uri/ /2048/index.html;
    }

    # Cache static assets (hub)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
