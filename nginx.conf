server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Hub landing page at /
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Each app gets its own subpath — their assets are copied into
    # the corresponding directory at build/deploy time.
    # Example: /2048/ is served from /usr/share/nginx/html/2048/
    location /2048/ {
        try_files $uri $uri/ /2048/index.html;
    }

    # Add more app locations here as needed:
    # location /snake/ {
    #     try_files $uri $uri/ /snake/index.html;
    # }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
