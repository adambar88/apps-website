server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss: ws: https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'none'" always;

    # Health check endpoint for Coolify
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # Hub landing page at /
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Snake game — proxied to game-snake container
    location ^~ /snake/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_snake http://game-snake:80;
        proxy_pass $upstream_snake;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2048 game — proxied to game-2048 container
    location ^~ /2048/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_2048 http://game-2048:80;
        proxy_pass $upstream_2048;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Shopping list app — proxied to shopping-app container
    location ^~ /shopping/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_shopping http://shopping-app:80;
        proxy_pass $upstream_shopping;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Shopping API — proxied to shopping-api container
    location ^~ /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://shopping-api:3001;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Shopping WebSocket
    location ^~ /ws {
        resolver 127.0.0.11 valid=10s;
        set $upstream_ws http://shopping-api:3001;
        proxy_pass $upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Cache static assets (hub only)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
