<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apps — barczynski.dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        dark: '#050505',
                        card: '#0f0f0f',
                        accent: '#ffffff',
                        muted: '#888888',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --c-bg: #050505;
            --c-text: #fff;
            --c-muted: #888;
            --c-muted-hover: #fff;
            --c-border: #1a1a1a;
            --c-card: #0d0d0d;
            --c-card-border: #1a1a1a;
            --c-card-border-hover: #333;
            --c-tag-bg: #111;
            --c-tag: #555;
            --c-tag-border: #222;
            --c-toolbar-bg: #0d0d0d;
            --c-toolbar-border: #1a1a1a;
            --c-btn-active: #1f1f1f;
            --c-dim: #333;
            --c-arrow: #555;
            --c-soon-bg: #0a0a0a;
            --c-soon-text: #2a2a2a;
        }

        html[data-theme="light"] {
            --c-bg: #f5f0eb;
            --c-text: #1a1410;
            --c-muted: #7a6f65;
            --c-muted-hover: #1a1410;
            --c-border: #e0d8d0;
            --c-card: #ede8e2;
            --c-card-border: #e0d8d0;
            --c-card-border-hover: #b8ad9e;
            --c-tag-bg: #e8e2db;
            --c-tag: #7a6f65;
            --c-tag-border: #d8d0c8;
            --c-toolbar-bg: #ece6df;
            --c-toolbar-border: #e0d8d0;
            --c-btn-active: #ddd6cc;
            --c-dim: #c8bfb5;
            --c-arrow: #998f85;
            --c-soon-bg: #ede8e2;
            --c-soon-text: #b8ad9e;
        }

        body {
            background-color: var(--c-bg);
            color: var(--c-text);
            font-family: 'Space Grotesk', sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }
    </style>
</head>

<body class="selection:bg-white selection:text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
